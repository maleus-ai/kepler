# complex.kepler.yaml ‚Äî Stress-test config exercising every Kepler feature
#
# 52 services across 8 tiers: Infrastructure ‚Üí Setup ‚Üí Core ‚Üí Business ‚Üí
# Workers ‚Üí Monitoring ‚Üí Deferred/Reactive ‚Üí Optional/Conditional
#
# All commands use sh -c with basic unix tools only (echo, sleep, touch, test, date, exit).
# No real databases, servers, or network services are needed.

lua: |
  -- Global port counter
  _port = 5000
  function next_port()
    _port = _port + 1
    return tostring(_port)
  end

  -- Service registry for cross-referencing
  _services = {}
  function register_service(name)
    _services[name] = true
    return name
  end

  -- Shared global state for cross-service coordination
  global.base_port = 3000
  global.platform_version = "2.5.0"
  global.initialized_services = 0

  -- Track service initialization
  function track_init(name)
    global.initialized_services = global.initialized_services + 1
    return name .. " (#" .. tostring(global.initialized_services) .. ")"
  end

  -- Build environment array for a service with optional extras
  function svc_env(name, extras)
    local env = {
      "SERVICE_NAME=" .. name,
      "SERVICE_PORT=" .. next_port(),
      "PLATFORM_VERSION=" .. global.platform_version
    }
    if extras then
      for _, e in ipairs(extras) do
        table.insert(env, e)
      end
    end
    return env
  end

kepler:
  default_inherit_env: true
  timeout: 30s
  output_max_size: "2mb"

  logs:
    retention:
      on_stop: clear
      on_start: clear
      on_restart: clear
      on_exit: clear

services:
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 1: Infrastructure (5 services, no deps, all with healthchecks)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 1. postgres ‚Äî Full-featured infra service
  postgres:
    command:
      [
        "sh",
        "-c",
        "echo 'PostgreSQL starting'; touch /tmp/pg_ready; while true; do sleep 5; done",
      ]
    restart: always
    groups: ["kepler"]
    healthcheck:
      run: "test -f /tmp/pg_ready"
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 3s
    limits:
      memory: "512M"
      cpu_time: 300
      max_fds: 1024
    logs:
      retention:
        on_stop: retain
        on_start: clear
        on_restart: retain
        on_exit: retain
    hooks:
      pre_start:
        - if: ${{ not hook.initialized }}$
          run: echo "postgres first start ‚Äî creating data directory"
        - command: ["sh", "-c", "echo 'postgres pre_start ‚Äî checking config'"]
      post_start:
        command:
          ["sh", "-c", "echo 'postgres post_start ‚Äî accepting connections'"]
      post_healthcheck_success:
        run: echo "postgres healthcheck passed"
      post_healthcheck_fail:
        run: echo "postgres healthcheck FAILED"
      pre_cleanup:
        run: echo "postgres pre_cleanup ‚Äî archiving WAL files"

  # 2. redis ‚Äî With inherit_env override and hook environment
  redis:
    command:
      [
        "sh",
        "-c",
        "echo 'Redis starting'; touch /tmp/redis_ready; while true; do sleep 5; done",
      ]
    restart: always
    inherit_env: false
    healthcheck:
      run: "test -f /tmp/redis_ready"
      interval: 1s
      timeout: 2s
      retries: 3
      start_period: 1s
    limits:
      memory: "256M"
      max_fds: 512
    hooks:
      post_start:
        run: echo "redis post_start ‚Äî server ready"
        environment:
          - REDIS_MODE=standalone
        env_file: .env

  # 3. rabbitmq ‚Äî Lua environment, service-level wait
  rabbitmq:
    command:
      [
        "sh",
        "-c",
        "echo 'RabbitMQ starting'; touch /tmp/rmq_ready; while true; do sleep 5; done",
      ]
    restart: always
    environment: !lua |
      return svc_env(service.name, {"AMQP_PORT=" .. next_port()})
    healthcheck:
      run: "test -f /tmp/rmq_ready"
      interval: 3s
      timeout: 5s
      retries: 4
      start_period: 5s

  # 4. minio ‚Äî Inline expression expansion with defaults, working_dir
  minio:
    command:
      [
        "sh",
        "-c",
        "echo 'MinIO starting on ${MINIO_PORT:-9000}'; touch /tmp/minio_ready; while true; do sleep 5; done",
      ]
    restart: always
    working_dir: /tmp
    environment:
      - MINIO_ROOT_USER=${{ service.env.MINIO_USER or "minioadmin" }}$
      - MINIO_ROOT_PASSWORD=${{ service.env.MINIO_PASS or "minioadmin" }}$
      - MINIO_PORT=${{ service.env.MINIO_PORT or "9000" }}$
    healthcheck:
      run: "test -f /tmp/minio_ready"
      interval: 1500ms
      timeout: 3s
      retries: 3
      start_period: 2s

  # 5. consul ‚Äî Inline expression expansion, hook with working_dir
  consul:
    command:
      [
        "sh",
        "-c",
        "echo 'Consul starting ${CONSUL_DC:+in datacenter}'; touch /tmp/consul_ready; while true; do sleep 5; done",
      ]
    restart: always
    environment:
      - CONSUL_BIND=0.0.0.0
      - CONSUL_DC=${{ service.env.CONSUL_DC and "production" or "" }}$
    healthcheck:
      run: "test -f /tmp/consul_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    hooks:
      pre_start:
        run: echo "consul pre_start ‚Äî checking bind address"
        working_dir: /tmp
        groups: ["kepler"]

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 2: One-Shot Setup (5 services, service_completed_successfully / service_healthy deps)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 6. db-migration ‚Äî run: form, output capture, hook step outputs, advanced hook if
  db-migration:
    run: |
      echo 'Running database migrations...'
      sleep 1
      echo '::output::schema_version=42'
      echo '::output::tables_migrated=15'
      echo 'Migrations complete'
    restart: no
    output: true
    depends_on:
      postgres:
        condition: service_healthy
        timeout: 60s
    hooks:
      pre_start:
        - run: echo "::output::started_at=$(date +%s)"
          output: timing
        - run: echo "db-migration pre_start ‚Äî schema version from hook=${{ hooks.pre_start.outputs.timing.started_at }}$"
        - if: ${{ always() }}$
          run: echo "db-migration pre_start ‚Äî always runs regardless of prior step outcome"
      post_exit:
        - if: ${{ service.exit_code == 0 }}$
          run: echo "db-migration post_exit ‚Äî migration succeeded"
        - if: ${{ failure() }}$
          run: echo "db-migration post_exit ‚Äî a prior hook step failed, running cleanup"

  # 7. db-seed ‚Äî Cross-service output access, sequential env evaluation, outputs declaration
  db-seed:
    run: |
      echo "Seeding database (schema v${SCHEMA_VERSION})..."
      sleep 1
      echo "::output::rows_inserted=500"
      echo "::output::seed_status=complete"
      echo "Seed data loaded"
    restart: no
    output: true
    depends_on:
      db-migration:
        condition: service_completed_successfully
    environment:
      - SEED_ENV=development
      - SEED_COUNT=100
      - SCHEMA_VERSION=${{ deps["db-migration"].outputs.schema_version or "unknown" }}$
      - SEED_LABEL=${{ service.env.SEED_ENV }}$-v${{ service.env.SCHEMA_VERSION }}$
    outputs:
      seed_summary: "${{ service.env.SEED_LABEL }}$:${{ service.env.SEED_COUNT }}$-rows"

  # 8. redis-init ‚Äî run: form, output capture
  redis-init:
    run: |
      echo 'Initializing Redis keyspaces...'
      sleep 1
      echo '::output::keyspaces=sessions,cache,locks'
      echo 'Redis init complete'
    restart: no
    output: true
    depends_on:
      redis:
        condition: service_healthy

  # 9. minio-init ‚Äî run: form, output capture, limits
  minio-init:
    run: |
      echo 'Creating MinIO buckets...'
      sleep 1
      echo '::output::buckets=uploads,backups,logs'
      echo 'Buckets created'
    restart: no
    output: true
    depends_on:
      minio:
        condition: service_healthy
        timeout: 30s
    limits:
      memory: "128M"

  # 10. consul-register ‚Äî run: form, lua environment, output capture
  consul-register:
    run: |
      echo 'Registering services in Consul...'
      sleep 1
      echo '::output::registry_count=5'
      echo 'Registration complete'
    restart: no
    output: true
    depends_on:
      consul:
        condition: service_healthy
    environment: !lua |
      return svc_env(service.name, nil)

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 3: Core Services (5 services)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 11. auth-service ‚Äî 3 deps, service.restart_count, dep output access, hook dep state, global table
  auth-service:
    command: !lua |
      if service.restart_count > 0 then
        return {"sh", "-c", "echo 'Auth service RESTARTING (attempt " .. service.restart_count .. ")'; touch /tmp/auth_ready; while true; do sleep 5; done"}
      end
      return {"sh", "-c", "echo 'Auth service starting'; touch /tmp/auth_ready; while true; do sleep 5; done"}
    restart: always
    depends_on:
      - postgres:
          condition: service_healthy
          restart: true
      - redis:
          condition: service_healthy
      - db-migration:
          condition: service_completed_successfully
    environment:
      - SCHEMA_VERSION=${{ deps["db-migration"].outputs.schema_version or "unknown" }}$
      - RESTART_COUNT=${{ service.restart_count }}$
    healthcheck:
      run: "test -f /tmp/auth_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    hooks:
      pre_start:
        - if: ${{ not hook.initialized }}$
          run: echo "::output::jwt_key=rsa-256-init"
          output: init_keys
          environment: !lua |
            track_init(service.name)
            return {"INIT_PHASE=jwt_setup"}
        - run: echo "auth-service pre_start ‚Äî schema=${{ deps['db-migration'].outputs.schema_version or 'n/a' }}$"
      post_start:
        command: ["sh", "-c", "echo 'auth-service post_start ‚Äî listening'"]
      pre_stop:
        - run: echo "auth-service pre_stop ‚Äî draining connections"
        - if: ${{ deps.postgres.status == 'healthy' }}$
          run: echo "auth-service pre_stop ‚Äî postgres still healthy, flushing sessions"
      post_stop:
        command: ["sh", "-c", "echo 'auth-service post_stop ‚Äî cleanup done'"]
      pre_restart:
        run: |
          echo "auth-service pre_restart ‚Äî restart #${{ service.restart_count }}$, saving state"
      post_restart:
        run: echo "auth-service post_restart ‚Äî state restored"

  # 12. config-service ‚Äî restart:on-failure, dep output access, healthcheck start_period:0s
  config-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Config service starting'; touch /tmp/config_ready; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - consul:
          condition: service_healthy
          restart: true
      - consul-register:
          condition: service_completed_successfully
    environment:
      - REGISTRY_COUNT=${{ deps["consul-register"].outputs.registry_count or "0" }}$
    healthcheck:
      run: "test -f /tmp/config_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 0s

  # 13. gateway ‚Äî File watching, long timeout dep, dynamic env_file path
  gateway:
    command:
      [
        "sh",
        "-c",
        "echo 'API Gateway starting'; touch /tmp/gateway_ready; while true; do sleep 5; done",
      ]
    restart:
      policy: always
      watch: ["./gateway/**/*.conf"]
    depends_on:
      - auth-service:
          condition: service_healthy
          timeout: 2m
      - config-service:
          condition: service_healthy
    env_file: ${{ kepler.env.GATEWAY_ENV_FILE or ".env" }}$
    environment:
      - GATEWAY_VERSION=${{ global.platform_version }}$
    healthcheck:
      run: "test -f /tmp/gateway_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 3s

  # 14. event-bus ‚Äî Lua healthcheck test, restart:always
  event-bus:
    command:
      [
        "sh",
        "-c",
        "echo 'Event bus starting'; touch /tmp/eventbus_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - rabbitmq:
          condition: service_healthy
          restart: true
    healthcheck:
      command: !lua |
        return {"sh", "-c", "test -f /tmp/eventbus_ready"}
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 15. storage-service ‚Äî Lua env, cross-service output access, service.status
  storage-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Storage service starting'; touch /tmp/storage_ready; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - minio:
          condition: service_healthy
      - minio-init:
          condition: service_completed_successfully
    environment: !lua |
      return svc_env(service.name, {
        "STORAGE_BACKEND=s3",
        "AVAILABLE_BUCKETS=" .. (deps["minio-init"].outputs.buckets or "default")
      })
    healthcheck:
      run: "test -f /tmp/storage_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    hooks:
      pre_start:
        run: echo "storage-service pre_start ‚Äî minio status=${{ deps.minio.status }}$"

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 4: Business Services (10 services)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 16. user-service
  user-service:
    command:
      [
        "sh",
        "-c",
        "echo 'User service starting'; touch /tmp/user_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - auth-service:
          condition: service_healthy
      - postgres:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/user_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 17. product-service ‚Äî logs store:false
  product-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Product service starting'; touch /tmp/product_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - postgres:
          condition: service_healthy
      - redis:
          condition: service_healthy
      - config-service:
          condition: service_started
    healthcheck:
      run: "test -f /tmp/product_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    logs:
      store: false

  # 18. inventory-service ‚Äî restart:on-failure
  inventory-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Inventory service starting'; touch /tmp/inventory_ready; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - product-service:
          condition: service_started
      - redis:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/inventory_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 19. order-service ‚Äî 4-dep fan-in, memory limit
  order-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Order service starting'; touch /tmp/order_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - user-service:
          condition: service_started
      - product-service:
          condition: service_started
      - inventory-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/order_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    limits:
      memory: "1G"

  # 20. payment-service ‚Äî Healthcheck hooks
  payment-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Payment service starting'; touch /tmp/payment_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - order-service:
          condition: service_started
      - auth-service:
          condition: service_healthy
          restart: true
    healthcheck:
      run: "test -f /tmp/payment_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    hooks:
      post_healthcheck_success:
        run: echo "payment-service healthcheck passed ‚Äî PCI compliance OK"
      post_healthcheck_fail:
        command:
          [
            "sh",
            "-c",
            "echo 'payment-service healthcheck FAILED ‚Äî alerting ops'",
          ]

  # 21. notification-service ‚Äî static depends_on with Lua condition
  notification-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Notification service starting'; touch /tmp/notif_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - event-bus:
          condition: service_healthy
      - rabbitmq:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/notif_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 22. email-service ‚Äî Watch + logs store extended, post_exit hook
  email-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Email service starting'; while true; do sleep 5; done",
      ]
    restart:
      policy: always
      watch: ["./templates/**/*.html"]
    depends_on:
      - notification-service:
          condition: service_started
    logs:
      store:
        stdout: true
        stderr: false
    hooks:
      post_exit:
        run: echo "email-service exited ‚Äî flushing email queue"

  # 23. search-service ‚Äî Lua command
  search-service:
    command: !lua |
      return {"sh", "-c", "echo Search service starting on port " .. next_port() .. "; touch /tmp/search_ready; while true; do sleep 5; done"}
    restart: always
    depends_on:
      - postgres:
          condition: service_healthy
      - redis:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/search_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 24. analytics-service ‚Äî 3-way fan-in, cross-service output access, dep state in hooks
  analytics-service:
    command:
      [
        "sh",
        "-c",
        "echo 'Analytics service starting'; touch /tmp/analytics_ready; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - postgres:
          condition: service_healthy
      - event-bus:
          condition: service_healthy
      - redis-init:
          condition: service_completed_successfully
    environment:
      - REDIS_KEYSPACES=${{ deps["redis-init"].outputs.keyspaces or "default" }}$
    healthcheck:
      run: "test -f /tmp/analytics_ready"
      interval: 3s
      timeout: 5s
      retries: 4
      start_period: 3s
    hooks:
      pre_start:
        run: echo "analytics pre_start ‚Äî postgres restarts=${{ deps.postgres.restart_count }}$, event-bus initialized=${{ deps['event-bus'].initialized }}$"

  # 25. report-service ‚Äî run: form, logs retention, output capture
  report-service:
    run: |
      echo "Report service starting"
      sleep 2
      echo "::output::report_id=rpt-$(date +%s)"
      echo "::output::report_status=generated"
      echo "Report generated"
    restart: no
    output: true
    depends_on:
      - analytics-service:
          condition: service_healthy
          timeout: 60s
      - storage-service:
          condition: service_started
    logs:
      retention:
        on_exit: retain

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 5: Workers (10 services)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 26. order-worker ‚Äî limits memory + max_fds
  order-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Order worker started''; while true; do echo "[$(date +%T)] Processing orders"; sleep 10; done',
      ]
    restart: always
    depends_on:
      - order-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    limits:
      memory: "256M"
      max_fds: 256

  # 27. payment-worker ‚Äî limits cpu_time only
  payment-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Payment worker started''; while true; do echo "[$(date +%T)] Processing payments"; sleep 10; done',
      ]
    restart: always
    depends_on:
      - payment-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    limits:
      cpu_time: 600

  # 28. email-worker ‚Äî pre_restart + post_restart hooks
  email-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Email worker started''; while true; do echo "[$(date +%T)] Sending emails"; sleep 10; done',
      ]
    restart: on-failure
    depends_on:
      - email-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    hooks:
      pre_restart:
        run: echo "email-worker pre_restart ‚Äî flushing pending emails"
      post_restart:
        command:
          ["sh", "-c", "echo 'email-worker post_restart ‚Äî resuming queue'"]

  # 29. search-indexer ‚Äî Lua watch pattern, limits memory
  search-indexer:
    command:
      [
        "sh",
        "-c",
        'echo ''Search indexer started''; while true; do echo "[$(date +%T)] Indexing"; sleep 10; done',
      ]
    restart:
      policy: always
      watch: !lua |
        return {"./data/**/*.json", "./schema/*.yaml"}
    depends_on:
      - search-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    limits:
      memory: "512M"

  # 30. analytics-worker ‚Äî Custom log config
  analytics-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Analytics worker started''; while true; do echo "[$(date +%T)] Crunching numbers"; sleep 10; done',
      ]
    restart: always
    depends_on:
      - analytics-service:
          condition: service_started
      - event-bus:
          condition: service_healthy

  # 31. notification-worker ‚Äî env_file
  notification-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Notification worker started''; while true; do echo "[$(date +%T)] Sending notifications"; sleep 10; done',
      ]
    restart: always
    depends_on:
      - notification-service:
          condition: service_started
      - rabbitmq:
          condition: service_healthy
    env_file: .env

  # 32. cache-warmer ‚Äî 3-dep fan-in
  cache-warmer:
    command:
      [
        "sh",
        "-c",
        'echo ''Cache warmer started''; while true; do echo "[$(date +%T)] Warming cache"; sleep 30; done',
      ]
    restart: on-failure
    depends_on:
      - redis:
          condition: service_healthy
      - product-service:
          condition: service_started
      - user-service:
          condition: service_started

  # 33. data-sync-worker ‚Äî inherit_env:false override, log retention override
  data-sync-worker:
    command:
      [
        "sh",
        "-c",
        'echo ''Data sync worker started''; while true; do echo "[$(date +%T)] Syncing data"; sleep 15; done',
      ]
    restart: always
    inherit_env: false
    depends_on:
      - postgres:
          condition: service_healthy
      - redis:
          condition: service_healthy
      - event-bus:
          condition: service_healthy
    logs:
      retention:
        on_stop: retain
        on_start: retain
        on_restart: retain
        on_exit: retain

  # 34. file-processor ‚Äî ALL 3 limits
  file-processor:
    command:
      [
        "sh",
        "-c",
        'echo ''File processor started''; while true; do echo "[$(date +%T)] Processing files"; sleep 10; done',
      ]
    restart: on-failure
    depends_on:
      - storage-service:
          condition: service_started
      - event-bus:
          condition: service_healthy
    limits:
      memory: "1G"
      max_fds: 2048
      cpu_time: 3600

  # 35. scheduled-cleanup ‚Äî logs retention on_exit:clear
  scheduled-cleanup:
    command:
      [
        "sh",
        "-c",
        'echo ''Cleanup scheduler started''; while true; do echo "[$(date +%T)] Running cleanup"; sleep 60; done',
      ]
    restart: always
    depends_on:
      - postgres:
          condition: service_healthy
      - storage-service:
          condition: service_started
    logs:
      retention:
        on_exit: clear

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 6: Monitoring (8 services)
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 36. metrics-collector ‚Äî No deps (wide parallelism), healthcheck, limits
  metrics-collector:
    command:
      [
        "sh",
        "-c",
        "echo 'Metrics collector starting'; touch /tmp/metrics_ready; while true; do sleep 5; done",
      ]
    restart: always
    healthcheck:
      run: "test -f /tmp/metrics_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s
    limits:
      memory: "128M"

  # 37. log-aggregator ‚Äî No deps, logs store extended (stdout:false, stderr:true)
  log-aggregator:
    command:
      [
        "sh",
        "-c",
        "echo 'Log aggregator starting'; while true; do sleep 5; done",
      ]
    restart: always
    logs:
      store:
        stdout: false
        stderr: true

  # 38. health-monitor ‚Äî 5-dep fan-in (ALL infra healthy)
  health-monitor:
    command:
      [
        "sh",
        "-c",
        "echo 'Health monitor starting'; touch /tmp/healthmon_ready; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - postgres:
          condition: service_healthy
      - redis:
          condition: service_healthy
      - rabbitmq:
          condition: service_healthy
      - minio:
          condition: service_healthy
      - consul:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/healthmon_ready"
      interval: 3s
      timeout: 5s
      retries: 4
      start_period: 3s

  # 39. alert-manager ‚Äî Lua environment with hook.name and service.name
  alert-manager:
    command:
      [
        "sh",
        "-c",
        "echo 'Alert manager starting'; while true; do sleep 5; done",
      ]
    restart: always
    depends_on:
      - health-monitor:
          condition: service_healthy
      - metrics-collector:
          condition: service_started
    hooks:
      pre_start:
        run: echo "alert-manager pre_start"
        environment: !lua |
          return {"ALERT_SVC=" .. service.name, "ALERT_HOOK=" .. hook.name}

  # 40. dashboard ‚Äî 4-dep fan-in, Lua command, healthcheck
  dashboard:
    command: !lua |
      return {"sh", "-c", "echo Dashboard on port " .. next_port() .. "; touch /tmp/dash_ready; while true; do sleep 5; done"}
    restart: always
    depends_on:
      - metrics-collector:
          condition: service_started
      - log-aggregator:
          condition: service_started
      - health-monitor:
          condition: service_started
      - alert-manager:
          condition: service_started
    healthcheck:
      run: "test -f /tmp/dash_ready"
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 2s

  # 41. uptime-checker ‚Äî Lua global table usage, conditional startup
  uptime-checker:
    if: ${{ true }}$
    command:
      [
        "sh",
        "-c",
        "echo 'Uptime checker starting'; touch /tmp/uptime_ready; while true; do sleep 10; done",
      ]
    restart: always
    depends_on:
      - consul:
          condition: service_healthy
    healthcheck:
      run: "test -f /tmp/uptime_ready"
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    environment: !lua |
      local label = track_init(service.name)
      register_service(service.name)
      return svc_env(service.name, {"INIT_LABEL=" .. label})

  # 42. trace-collector ‚Äî Deep chain (5+ levels: rabbitmq‚Üíevent-bus‚Üígateway‚Üítrace-collector)
  trace-collector:
    command:
      [
        "sh",
        "-c",
        "echo 'Trace collector starting'; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - gateway:
          condition: service_started
      - event-bus:
          condition: service_healthy

  # 43. audit-logger ‚Äî 3 deps, ALL 4 retention=retain, limits max_fds
  audit-logger:
    command:
      ["sh", "-c", "echo 'Audit logger starting'; while true; do sleep 5; done"]
    restart: always
    depends_on:
      - auth-service:
          condition: service_started
      - event-bus:
          condition: service_started
      - postgres:
          condition: service_started
    logs:
      retention:
        on_stop: retain
        on_start: retain
        on_restart: retain
        on_exit: retain
    limits:
      max_fds: 4096

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 7: Deferred/Reactive (7 services)
  # Uses service_failed, service_stopped, service_unhealthy conditions
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 44. postgres-failover ‚Äî service_failed with exit_code range + single value
  postgres-failover:
    command:
      [
        "sh",
        "-c",
        "echo 'FAILOVER: Promoting PostgreSQL replica'; sleep 2; echo 'Failover complete'; exit 0",
      ]
    restart: no
    depends_on:
      - postgres:
          condition: service_failed
          exit_code: ["1:10", 42]

  # 45. redis-failover ‚Äî service_failed (any exit code)
  redis-failover:
    command:
      [
        "sh",
        "-c",
        "echo 'FAILOVER: Switching to Redis replica'; sleep 2; echo 'Redis failover complete'; exit 0",
      ]
    restart: no
    depends_on:
      - redis:
          condition: service_failed

  # 46. cleanup-on-stop ‚Äî service_stopped with and without exit_code filter
  cleanup-on-stop:
    command:
      [
        "sh",
        "-c",
        "echo 'Cleaning up after service stop'; sleep 1; echo 'Cleanup done'; exit 0",
      ]
    restart: no
    depends_on:
      - order-service:
          condition: service_stopped
          exit_code: [0]
      - payment-service:
          condition: service_stopped

  # 47. health-alert ‚Äî service_unhealthy (deferred condition, fires if health-monitor becomes unhealthy)
  health-alert:
    command:
      [
        "sh",
        "-c",
        "echo 'ALERT: Health monitor became unhealthy!'; sleep 1; exit 0",
      ]
    restart: no
    depends_on:
      - health-monitor:
          condition: service_unhealthy

  # 48. cascade-handler ‚Äî Deferred chain, allow_skipped, skipped() function, dep state access
  cascade-handler:
    run: |
      echo "Cascade handler ‚Äî running post-failover tasks"
      sleep 1
    restart: no
    depends_on:
      - postgres-failover:
          condition: service_completed_successfully
          allow_skipped: true
    hooks:
      pre_start:
        - if: ${{ skipped('postgres-failover') }}$
          run: echo "cascade-handler ‚Äî postgres-failover was skipped, running in no-op mode"
        - if: ${{ success('postgres-failover') }}$
          run: echo "cascade-handler ‚Äî postgres-failover succeeded, proceeding with full recovery"

  # 49. emergency-shutdown ‚Äî 3x service_failed fan-in
  emergency-shutdown:
    command:
      [
        "sh",
        "-c",
        "echo 'EMERGENCY: Multiple infrastructure failures detected!'; echo 'Initiating emergency shutdown'; sleep 2; exit 0",
      ]
    restart: no
    depends_on:
      - postgres:
          condition: service_failed
      - redis:
          condition: service_failed
      - rabbitmq:
          condition: service_failed
    hooks:
      pre_start:
        - if: ${{ not hook.initialized }}$
          run: echo "::output::runbook_loaded=true"
          output: init_step
        - run: echo "emergency-shutdown pre_start ‚Äî notifying oncall, runbook=${{ hooks.pre_start.outputs.init_step.runbook_loaded or 'skipped' }}$"
        - if: ${{ failure() }}$
          run: echo "emergency-shutdown pre_start ‚Äî a prior step failed, proceeding with caution"
        - if: ${{ always() }}$
          run: echo "emergency-shutdown pre_start ‚Äî final step always executes"
      post_exit:
        - if: ${{ service.exit_code == 0 }}$
          run: echo "emergency-shutdown post_exit ‚Äî incident report filed successfully"
        - if: ${{ service.exit_code ~= 0 }}$
          run: echo "emergency-shutdown post_exit ‚Äî shutdown failed with code ${{ service.exit_code }}$"

  # 50. post-mortem ‚Äî run: form, embedded expressions, dep exit_code access
  post-mortem:
    run: |
      echo "Post-mortem analysis starting"
      echo "Report dir: ${REPORT_DIR}"
      echo "Emergency shutdown exit code: ${EMERGENCY_EXIT_CODE}"
      sleep 2
      echo "Post-mortem complete"
    restart: no
    depends_on:
      - emergency-shutdown:
          condition: service_completed_successfully
          timeout: 5m
    environment:
      - REPORT_DIR=${{ service.env.REPORT_DIR or "/tmp/reports" }}$
      - INCIDENT_ID=${{ service.env.INCIDENT_ID or "unknown" }}$
      - EMERGENCY_EXIT_CODE=${{ deps["emergency-shutdown"].exit_code }}$
      - PLATFORM_VERSION=${{ global.platform_version }}$
    hooks:
      post_exit:
        - command:
            ["sh", "-c", "echo 'post-mortem post_exit ‚Äî archiving report'"]
        - if: ${{ always() }}$
          run: echo "post-mortem ‚Äî final cleanup, status=${{ service.status }}$"

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # TIER 8: Optional/Conditional (2 services)
  # Demonstrates conditional startup (if), allow_skipped, skip cascading
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # 51. profiler ‚Äî Conditional service, only starts when ENABLE_PROFILING is set
  profiler:
    if: ${{ service.env.ENABLE_PROFILING ~= nil }}$
    command:
      [
        "sh",
        "-c",
        "echo 'Profiler starting'; touch /tmp/profiler_ready; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - gateway:
          condition: service_started
    healthcheck:
      run: "test -f /tmp/profiler_ready"
      interval: 3s
      timeout: 5s
      retries: 3
      start_period: 2s

  # 52. profiler-dashboard ‚Äî Depends on profiler with allow_skipped (starts even if profiler is skipped)
  profiler-dashboard:
    command:
      [
        "sh",
        "-c",
        "echo 'Profiler dashboard starting'; while true; do sleep 5; done",
      ]
    restart: on-failure
    depends_on:
      - profiler:
          condition: service_healthy
          allow_skipped: true
      - dashboard:
          condition: service_started
